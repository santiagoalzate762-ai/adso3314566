<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>01_document</title>
    <link rel="stylesheet" href="/src/css/03.css.css">
    <style>
        div.multiples {
            background: url(/src/imgs/bg3.png) repeat,
                        url(/src/imgs/bg2.png) repeat,
                        url(/src/imgs/bg1.png) repeat;
                height: 453px;
        }
        section div {
            border: 4px solid #000d;
            border-radius: 10px;
            margin: 1rem auto;
            height: 200px;
            width: 320px;
        }
        div.gradient1 {
            background: linear-gradient(to top, #100441, #757e);
        }
        div.gradient2 {
            background: linear-gradient(45deg, #87ea87, #033109);
        }
        div.gradient3 {
            background: linear-gradient(to bottom,
            #ffcd00 50%,
            #003087 50%,
            #003087 70%,
            #c8102e 75%);
        }
        div.gradient4 {
            background: linear-gradient(to right, #fff 50%, #333 50%);
            background-size: 37px;
        }
        div.gradient5 {
            background: radial-gradient(circle, #caa1e7, #210337);
        }
        div.gradient6 {
            background: radial-gradient(circle, #fff 20%,
            #333 20%,
            #333 40%,
            #fff 40%,
            #fff 60%,
            #333 60%,
            #333 80%,
            #fff 80%);
        }
        div.gradient7 {
            background: conic-gradient(red, orange, yellow, green, cyan, blue);
        }
        main section h4{
            margin: 0;
            text-align: center;
            font-weight: 900;
            font-size: 8rem;
        }
        h4.clip1 {
            background: linear-gradient(45deg, #82009f 0%, #f7345e 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        h4.clip2 {
            background: url(/src/imgs/bgfire.jpg) no-repeat center;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        div.mask{
            width: 120px;
            height: 120px;
            background: linear-gradient(to top, red, yellow);
            margin: 2rem auto;
            mask-image: url(/src/imgs/mask.svg);
            mask-size: 100% 100%;
        }
    </style>
</head>
<body>
    <a class="btn-home" href="../index.html">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#000000" viewBox="0 0 256 256"><path d="M240,208H224V136l2.34,2.34A8,8,0,0,0,237.66,127L139.31,28.68a16,16,0,0,0-22.62,0L18.34,127a8,8,0,0,0,11.32,11.31L32,136v72H16a8,8,0,0,0,0,16H240a8,8,0,0,0,0-16ZM48,120l80-80,80,80v88H160V152a8,8,0,0,0-8-8H104a8,8,0,0,0-8,8v56H48Zm96,88H112V160h32Z"></path></svg>
    </a>
    <main>
        <section>
            <h3>Bgs Multiples</h3>
            <div class="multiples"></div>
            <h3>Bgs Gradients:</h3>
            <h5>Linear-gradient(to direction, color1, color2)</h5>
            <div class="gradient1"></div>
            <h5>Linear-gradient(degrees, color1, color2)</h5>
            <div class="gradient2"></div>
            <h5>Colombia Flag</h5>
            <div class="gradient3"></div>
            <h5>Vertical Lines</h5>
            <div class="gradient4"></div>
            <h5>Radial-gradient(shape, color1, color2)</h5>
            <div class="gradient5"></div>
            <h5>BullsEye</h5>
            <div class="gradient6"></div>
            <h5>Conic-gradient(color1, color2)</h5>
            <div class="gradient7"></div>
            <h3>Bgs Clip:</h3>
            <h4 class="clip1">ADSO</h4>
            <h4 class="clip2">Fire</h4>
            <h3>Bg Mask</h3>
            <div class="mask"></div>
        </section>
    </main>
</body>
</html>
