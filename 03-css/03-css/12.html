<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12_colors_alpha</title>
    <link rel="stylesheet" href="/src/css/03.css.css">
    <style>
        body{
            display: flex;
            flex-direction: column;
        }
        figure.mario {
            background: url(../imgs/super-mario-odyssey-for-the-nintendo-switch-home-gaming-40.png) no-repeat;
            border: 4px solid white;
            margin: block 4rem;
            height: 450px;
            width: 450px;
            div{
                height:calc(450px/3);
                &.box1{
                    background-color:rgba(255, 255, 255, 0.8)
                }
                &.box2{
                    background-color: #ffffff77;
                }
                &.box3{
                    background-color:hsla(0, 0%, 100%, 0.267);
                }
            }
        }
    </style>

</head>
<body>
    <a class="btn-home" href="../index.html">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#000000" viewBox="0 0 256 256"><path d="M240,208H224V136l2.34,2.34A8,8,0,0,0,237.66,127L139.31,28.68a16,16,0,0,0-22.62,0L18.34,127a8,8,0,0,0,11.32,11.31L32,136v72H16a8,8,0,0,0,0,16H240a8,8,0,0,0,0-16ZM48,120l80-80,80,80v88H160V152a8,8,0,0,0-8-8H104a8,8,0,0,0-8,8v56H48Zm96,88H112V160h32Z"></path></svg>
    </a>
    <main>
        <header>
            <h1>12-colors-alpha</h1>
            <h2>The fourth alpha channel allows you to apply opacity or transparency to the color.</h2>
        </main>
        </header>
            <section>
                <h3>example transparent color</h3>
                <figure class="mario">
                    <div class="box1"></div>
                    <div class="box2"></div>
                    <div class="box3"></div>
                </figure>
            </section>
    </main>
</body>
</html>
