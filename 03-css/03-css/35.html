    <style>
    .transform-container {
    display: flex;
    gap: 40px;
    flex-wrap: wrap;
    padding: 50px
}

    .box {
        width: 150px;
        height: 150px;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #8ddb34;
        color: white;
        font-size: 22px;
        font-weight: bold;
        border-radius: 15px;
        transition: 0.5s;
    }


    .rotate:hover {
        transform: rotate(45deg);

    }

    .scale:hover {
        transform: scale(1.3);

    }

    .skew:hover {
        transform: skew(20deg);
    }

    .translate:hover {
        transform: translate(50px, 30px);

    }
    </style>
</head>

            </div>

            </section>
