<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>01-Document Style</title>
    <link rel="stylesheet" href="/src/css/03.css.css">
    <style>
       section{
    section{
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.box{
    width: 250px;
    padding: 20px;
    background: rgba(255,255,255,0.1);
    border: 2px solid white;
    text-align: center;
    font-size: 18px;
}



.default{
    cursor: default;
}

.pointer{
    cursor: pointer;
}

.text{
    cursor: text;
}

.move{
    cursor: move;
}

.not-allowed{
    cursor: not-allowed;
}
    </style>
</head>
<body>
    <a href="../index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="white" viewBox="0 0 256 256">
            <path
                d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z">
            </path>
        </svg> 
    </a>
    <main>
        <header>
            <h1>20 pseudoclases</h1>
            <h2>Is used to define a special state of an element.</h2>
        </header>
         <section>

        <div class="box default">
            Default
        </div>

        <div class="box pointer">
            Pointer
        </div>

        <div class="box text">
            Text
        </div>

        <div class="box move">
            Move
        </div>

        <div class="box not-allowed">
            Not Allowed
        </div>

    </section>


    </main>
</body>
</html>
