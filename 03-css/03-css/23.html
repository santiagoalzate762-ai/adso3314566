<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>23-Sprite</title>

    <link rel="stylesheet" href="/src/css/03.css.css">

    <style>

        body{
            display: flex;
            flex-direction: column;
        }

        section{
            display: flex;
            justify-content: center;
            gap: 50px;
            flex-wrap: wrap;
        }

        .sprite-box{
            background-color: #2b1838c7;

            border-radius: 15px;

            padding: 20px;

            text-align: center;

            width: 380px;
        }

        .sprite-box h3{
            color: white;

            border-bottom: 2px dotted white;

            padding-bottom: 10px;

            margin-bottom: 20px;
        }

        /* ========================= */
        /* INSTRUCTOR SPRITE */
        /* ========================= */

        div#sprite{
            background: url(../imgs/anim-sprite.png) no-repeat;

            width: 256px;
            height: 256px;

            margin: 1rem auto;
        }

        div#sprite.sp1 {
            background-position: calc(-256px * 0) 0;
        }

        div#sprite.sp2 {
            background-position: calc(-256px * 1) 0;
        }

        div#sprite.sp3 {
            background-position: calc(-256px * 2) 0;
        }

        div#sprite.sp4 {
            background-position: calc(-256px * 3) 0;
        }

        div#sprite.sp5 {
            background-position: calc(-256px * 4) 0;
        }

        div#sprite.sp6 {
            background-position: calc(-256px * 5) 0;
        }

        /* ========================= */
        /* BUTTERFLY SPRITE */
        /* ========================= */

        .steps{

            width: 256px;
            height: 256px;

            margin: 20px auto;

            background: url(../imgs/steps-03.png)
            no-repeat;

            animation: fly 1s steps(6) infinite;
        }

        @keyframes fly{

            from{
                background-position: 0 0;
            }

            to{
                background-position: -1536px 0;
            }

        }

    </style>

</head>

<body>

    <a href="../index.html" class="btn-home">

        <svg xmlns="http://www.w3.org/2000/svg"
            width="32"
            height="32"
            fill="white"
            viewBox="0 0 256 256">

            <path
                d="M224,128a8,8,0,0,1-8,8H59.31
                l58.35,58.34a8,8,0,0,1-11.32,11.32
                l-72-72a8,8,0,0,1,0-11.32l72-72
                a8,8,0,0,1,11.32,11.32L59.31,120H216
                A8,8,0,0,1,224,128Z">
            </path>

        </svg>

    </a>

    <header>

        <h1>23 Sprite</h1>

        <h2>
            An image sprite is a collection of images put into a single image.
        </h2>

    </header>

    <section>

        <!-- INSTRUCTOR SPRITE -->

        <div class="sprite-box">

            <h3>Instructor Sprite</h3>

            <div id="sprite" class="sp1"></div>

        </div>

        <!-- MY SPRITE -->

        <div class="sprite-box">

            <h3>Butterfly Sprite</h3>

            <div class="steps"></div>

        </div>

    </section>

    <script>

        /* ========================= */
        /* INSTRUCTOR SPRITE */
        /* ========================= */

        const sprite = document.getElementById('sprite')

        const numSprite = 6

        let count = 1

        setInterval(() => {

            sprite.className = ''

            sprite.classList.add('sp' + count)

            if(count == numSprite){
                count = 1
            } else {
                count++
            }

        }, 80)

    </script>

</body>
</html>
