<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>01-Document Style</title>
    <link rel="stylesheet" href="/src/css/03.css.css">
    <style>
    section{
    display: flex;
    flex-direction: column;
    gap: 25px;
}



.align{
    text-align: center;
    background: crimson;
    padding: 10px;
}



.line-height{
    line-height: 2;
    background: dodgerblue;
    padding: 10px;
}


.decoration{
    text-decoration: underline;
    background: orange;
    padding: 10px;
}



.transform{
    text-transform: uppercase;
    background: purple;
    padding: 10px;
}



.indent{
    text-indent: 50px;
    background: green;
    padding: 10px;
}



.spacing{
    letter-spacing: 3px;
    word-spacing: 10px;
    background: black;
    padding: 10px;
}
    </style>
</head>
<body>
    <a href="../index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="white" viewBox="0 0 256 256">

            </path>
        </svg>

    <main>
        <header>

        <section>

        <div class="align">

        </div>

        <div class="line-height">
            Lorem ipsum dolor sit amet consectetur adipisicing elit. 
            Lorem ipsum dolor sit amet consectetur adipisicing elit.
        </div>

        <div class="decoration">
            Text Decoration example
        </div>

        <div class="transform">
            text transform example
        </div>

        <div class="indent">
            Este párrafo tiene indentación al inicio para demostrar text-indent.
        </div>

        <div class="spacing">
