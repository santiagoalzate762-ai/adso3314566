<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>01_document</title>
    <link rel="stylesheet" href="/src/css/03.css.css">
    <link rel="stylesheet" href="/src/css/externalfile.css">

    <style>
        .gallery img {
    width: 100px;
    height: 180px;
    object-fit: cover;
    border-radius: 10px;
    transition: all 0.4s ease;
}

/* Blur */
.filter-blur {
    filter: blur(4px);
}

.filter-blur:hover {
    filter: none;
}

/* Grayscale */
.filter-grayscale {
    filter: grayscale(100%);
}

.filter-grayscale:hover {
    filter: none;
}

/* Sepia */
.filter-sepia {
    filter: sepia(100%);
}

.filter-sepia:hover {
    filter: none;
}

/* Brightness */
.filter-brightness {
    filter: brightness(180%);
}

.filter-brightness:hover {
    filter: none;
}

/* Contrast */
.filter-contrast {
    filter: contrast(200%);
}

.filter-contrast:hover {
    filter: none;
}

/* Saturate */
.filter-saturate {
    filter: saturate(300%);
}

.filter-saturate:hover {
    filter: none;
}
    </style>
</head>
<body>
    <a class="btn-home" href="../index.html">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#000000" viewBox="0 0 256 256"><path d="M240,208H224V136l2.34,2.34A8,8,0,0,0,237.66,127L139.31,28.68a16,16,0,0,0-22.62,0L18.34,127a8,8,0,0,0,11.32,11.31L32,136v72H16a8,8,0,0,0,0,16H240a8,8,0,0,0,0-16ZM48,120l80-80,80,80v88H160V152a8,8,0,0,0-8-8H104a8,8,0,0,0-8,8v56H48Zm96,88H112V160h32Z"></path></svg>
    </a>
    <main>
        <header>
            <h1>31. filters</h1>
            <h2>Defines visual effects (like blur and saturation).</h2>
            <section class="filters-examples">
                <h2>31. Filters</h2>

                <div class="gallery">
                    <img class="filter-blur" src="/src/imgs/inosuke.png" alt="Blur">
                    <img class="filter-grayscale" src="/src/imgs/inosuke.png" alt="Grayscale">
                    <img class="filter-sepia" src="/src/imgs/inosuke.png" alt="Sepia">
                    <img class="filter-brightness" src="/src/imgs/inosuke.png" alt="Brightness">
                    <img class="filter-contrast" src="/src/imgs/inosuke.png" alt="Contrast">
                    <img class="filter-saturate" src="/src/imgs/inosuke.png" alt="Saturate">
                </div>
            </section>
        </header>
    </main>
</body>
</html>
