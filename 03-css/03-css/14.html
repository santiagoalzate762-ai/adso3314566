<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>01-Document Style</title>
    <link rel="stylesheet" href="/src/css/03.css.css">
    <style>
       section{
    display: flex;
    flex-direction: column;
    gap: 30px;
}

/* ========================= */
/* background-color */
/* ========================= */

.background-color{
    width: 500px;
    height: 150px;

    background-color: crimson;

    border: 4px solid white;
    padding: 20px;
    font-size: 24px;
}

/* ========================= */
/* background-image */
/* ========================= */

.background-image{
    width: 500px;
    height: 150px;

    background-image: url(../imgs/multicolored-background-repeat-patterns-presentation-260nw-2178781599.jpg);

    border: 4px solid white;
    padding: 20px;
    font-size: 24px;
}

/* ========================= */
/* background-repeat */
/* ========================= */

.background-repeat{
    width: 500px;
    height: 150px;

    background-image: url(../imgs/multicolored-background-repeat-patterns-presentation-260nw-2178781599.jpg);

    background-repeat: repeat;
    background-size: 80px;
    border: 4px solid white;
    padding: 20px;
    font-size: 24px;
}

/* ========================= */
/* background-position */
/* ========================= */

.background-position{
    width: 500px;
    height: 150px;

    background-image: url('../imgs/multicolored-background-repeat-patterns-presentation-260nw-2178781599.jpg');

    background-repeat: no-repeat;

    background-position: center;

    border: 4px solid white;
    padding: 20px;
    font-size: 24px;
}

/* ========================= */
/* background-attachment */
/* ========================= */

.background-attachment{
    width: 500px;
    height: 200px;

    background-image: url('../imgs/multicolored-background-repeat-patterns-presentation-260nw-2178781599.jpg');

    background-attachment: fixed;

    background-size: cover;

    border: 4px solid white;
    padding: 20px;
    font-size: 24px;
}



            
    </style>
</head>
<body>
    <a href="../index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="white" viewBox="0 0 256 256">
            <path
                d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z">
            </path>
        </svg> 
    </a>
    <main>
        <header>
            <h1>14. background</h1>
        </header>
         <section>

            <div class="background-color">
                background-color
            </div>

            <div class="background-image">
                background-image
            </div>

            <div class="background-repeat">
                background-repeat
            </div>

            <div class="background-position">
                background-position
            </div>

            <div class="background-attachment">
                background-attachment
            </div>


        </section>
    </main>
</body>
</html>
