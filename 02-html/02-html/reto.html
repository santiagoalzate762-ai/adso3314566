<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/src/css/02-html.css">
</head>
<style>
  table {
    border-collapse: collapse;
    margin: 20px auto;
    border: 2px solid white;
    background-color: #222;
  }
  td {
    border: 1px solid #777;
    width: 40px;
    height: 40px;
    text-align: center;
    vertical-align: middle;
    font-size: 24px;
    color: white;
    background-color: #333;
    padding: 0;
  }
  td.black {
    background-color: black;
  }
</style>
</head>
<body>

<table>

<!-- FILA 1 -->
<tr>
  <td class="light" colspan="4"></td>
  <td class="dark">😎</td>
  <td class="light" colspan="3"></td>
</tr>

<!-- FILA 2 -->
<tr>
  <td class="light" colspan="3"></td>
  <td class="dark">😎</td>
  <td class="dark" rowspan="2">😎</td>
  <td class="dark">😎</td>
  <td class="light" colspan="2"></td>
</tr>

<!-- FILA 3 -->
<tr>
  <td class="light" colspan="2"></td>
  <td class="dark">😎</td>
  <td class="light"></td>
  <td class="dark">😎</td>
  <td class="light" colspan="2"></td>
</tr>

<!-- FILA 4 -->
<tr>
  <td class="light" colspan="2"></td>
  <td class="dark">😎</td>
  <td class="dark" colspan="3">😎</td>
  <td class="dark">😎</td>
  <td class="light"></td>
</tr>

<!-- FILA 5 -->
<tr>
  <td class="light"></td>
  <td class="dark">😎</td>
  <td class="dark" colspan="4">😎</td>
  <td class="dark">😎</td>
  <td class="light"></td>
</tr>

<!-- FILA 6 -->
<tr>
  <td class="light" colspan="2"></td>
  <td class="light"></td>
  <td class="dark">😎</td>
  <td class="dark">😎</td>
  <td class="dark">😎</td>
  <td class="light" colspan="2"></td>
</tr>

<!-- FILA 7 -->
<tr>
  <td class="light" colspan="3"></td>
  <td class="dark">😎</td>
  <td class="light"></td>
  <td class="dark">😎</td>
  <td class="light" colspan="2"></td>
</tr>

<!-- FILA 8 -->
<tr>
  <td class="light" colspan="4"></td>
  <td class="dark">😎</td>
  <td class="dark">😎</td>
  <td class="dark">😎</td>
  <td class="light"></td>
</tr>

<!-- FILA 9 -->
<tr>
  <td class="light" colspan="4"></td>
  <td class="light"></td>
  <td class="dark">😎</td>

  <td class="light" colspan="2"></td>
</tr>

</table>
</body>
</html>
