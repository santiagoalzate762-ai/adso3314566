<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>08-Images</title>
    <link rel="stylesheet" href="/src/css/02-html.css">
</head>
<style>
    body {
      background-color: #222;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: grid;
      grid-template-areas:
        "header"
        "nav"
        "main"
        "footer";
      grid-template-rows: auto auto 1fr auto;
      height: 100vh;
    }
    header {
      grid-area: header;
      background: #444;
      padding: 1rem;
      text-align: center;
    }
    nav {
      grid-area: nav;
      background: #555;
      padding: 1rem;
      text-align: center;
    }
    main {
      display: grid;
      grid-template-columns: 2fr 1fr;
      grid-gap: 1rem;
      grid-area: main;
      padding: 1rem;
    }
    article {
      background: #666;
      padding: 1rem;
      display: flex;
      flex-direction: column;
    }
    section {
      background: #777;
      padding: 1rem;
      margin-top: 1rem;
      flex-grow: 1;
    }
    aside {
      background: #666;
      padding: 1rem;
    }
    footer {
      grid-area: footer;
      background: #444;
      padding: 1rem;
      text-align: center;
    }
  </style>
</head>
<body>
    <a class="btn-home" href="../index.html">
  <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#000000" viewBox="0 0 256 256">
    <path d="M240,208H224V136l2.34,2.34A8,8,0,0,0,237.66,127L139.31,28.68a16,16,0,0,0-22.62,0L18.34,127a8,8,0,0,0,11.32,11.31L32,136v72H16a8,8,0,0,0,0,16H240a8,8,0,0,0,0-16ZM48,120l80-80,80,80v88H160V152a8,8,0,0,0-8-8H104a8,8,0,0,0-8,8v56H48Zm96,88H112V160h32Z"></path>
  </svg>
</a>
  <header>
    <h1>Encabezado principal</h1>
  </header>
  <nav>
    <p>Barra de navegación</p>
  </nav>
  <main>
    <article>
      <h2>Artículo Principal</h2>
      <section>
        <h3>Sección dentro del artículo</h3>
        <p>Contenido de la sección.</p>
      </section>
    </article>
    <aside>
      <h2>Barra lateral</h2>
      <p>Contenido adicional o enlaces.</p>
    </aside>
  </main>
  <footer>
    <p>Pie de página © 2026</p>
  </footer>
</body>
